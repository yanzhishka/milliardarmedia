    <script type="application/ld+json">

            "url": "https://milliardarmedia.ru/",
            "name": "Milliardar",
            "inLanguage": ["ru", "en"],
            "publisher": { "@id": "https://milliardarmedia.ru/#organization" },
            "potentialAction": {
              "@type": "SearchAction",

  <body class="home-page">
    <header class="site-header">
      <div class="masthead-top">
        <span class="masthead-date" data-date></span>
        <div class="masthead-tools">
          <form class="nav-search" role="search" action="/en/feed" method="get" data-feed-search>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" />
            </svg>
            <label class="visually-hidden" for="home-search-input">Search the feed</label>
            <input id="home-search-input" name="q" type="search" autocomplete="off" placeholder="Search" />
          </form>
          <a class="header-cta" href="/en/about#contact-form">Pitch a story</a>
          <a class="lang-switch" href="/" hreflang="ru" aria-label="На русском">RU</a>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme" aria-pressed="false">
            <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z" /></svg>
            <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19" /></svg>
          </button>
        </div>
      </div>

      <a class="brand" href="/en/" aria-label="Milliardar - home">
        <span class="brand-name">Milliardar</span>
      </a>

      <nav class="site-nav" aria-label="Sections">
        <a href="/en/feed">Feed</a>
        <a href="/en/podcasts">Podcasts</a>
        <a href="/en/about">About</a>
      </nav>
    </header>

    <main id="top">
      <section class="archive-section" aria-labelledby="feed-list-title">
        <div class="archive-head">
          <p class="section-kicker">Live feed</p>
          <h2 id="feed-list-title">Latest</h2>
          <p class="feed-status" data-feed-status role="status" aria-live="polite">Loading the feed…</p>
        </div>

        <div class="lead-cover-slot" data-featured></div>

        <div class="feed-panel-list" data-feed-list>
          <article class="feed-empty">
            <span>00</span>
            <h3>No posts yet.</h3>
            <p>New posts from Telegram will appear here.</p>
          </article>
        </div>

        <div class="front-more">
          <a class="button button-glass" href="/en/feed">Open the full feed</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>Milliardar</strong>

      </div>
      <nav aria-label="Footer navigation">

      </nav>
      <a href="#top">Top</a>
