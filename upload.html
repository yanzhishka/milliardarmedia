<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Загрузка подкаста - Миллиардар</title>
    <link rel="icon" href="assets/logo-favicon.png" type="image/png" />
    <link rel="stylesheet" href="styles.css?v=20260528-r2upload" />
  </head>
  <body class="upload-page">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Миллиардар - главная">
        <img class="brand-mark" src="assets/logo.png" alt="" aria-hidden="true" />
        <span class="brand-name">Миллиардар</span>
      </a>

      <nav class="site-nav" aria-label="Основная навигация">
        <a href="index.html#about">О нас</a>
        <a href="index.html">Лента</a>
        <a href="podcasts.html">Подкасты</a>
        <a href="index.html#team">Команда</a>
        <a href="index.html#contacts">Контакты</a>
      </nav>
    </header>

    <main id="top">
      <section class="upload-shell section">
        <p class="eyebrow">R2 upload</p>
        <h1>Загрузка выпуска.</h1>
        <p class="upload-intro" data-upload-intro>
          Проверяем одноразовую ссылку.
        </p>

        <form class="upload-form" data-upload-form hidden>
          <label>
            <span>Видео-файл</span>
            <input data-upload-file type="file" accept="video/*" required />
          </label>

          <button class="button button-dark" type="submit">Загрузить</button>
        </form>

        <div class="upload-progress" data-upload-progress hidden>
          <span data-upload-progress-bar></span>
        </div>

        <p class="upload-status" data-upload-status></p>
        <a class="upload-back" href="podcasts.html">Открыть подкасты</a>
      </section>
    </main>

    <script src="upload.js?v=20260528-r2upload2"></script>
  </body>
</html>
